<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KeyForge – Password Generator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a080f;
    --surface: #110f18;
    --surface2: #18151f;
    --border: rgba(255,255,255,0.07);
    --accent: #f542a8;
    --accent2: #f542d4;
    --text: #f0e8f0;
    --muted: #7a6b80;
    --danger: #f54242;
    --warn: #f5a742;
    --good: #a742f5;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px 80px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(245,66,168,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(245,66,168,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(245,66,168,0.07) 0%, transparent 70%);
    top: -200px; left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
  }

  header {
    text-align: center;
    margin-bottom: 48px;
  }

  .logo {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .logo-icon {
    width: 44px; height: 44px;
    border: 1.5px solid var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 20px rgba(245,66,168,0.25); }
    50% { box-shadow: 0 0 40px rgba(245,66,168,0.5); }
  }

  .logo-text {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  .logo-text span { color: var(--accent); }

  header p {
    color: var(--muted);
    font-size: 14px;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.5px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.6;
  }

  .output-section { margin-bottom: 32px; }

  .output-label {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }

  .password-display {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    color: var(--accent);
    word-break: break-all;
    line-height: 1.6;
    min-height: 68px;
    display: flex;
    align-items: center;
    transition: all 0.3s ease;
    overflow: hidden;
  }

  .password-display.multi {
    flex-direction: column;
    align-items: flex-start;
    gap: 10px;
    font-size: 14px;
  }

  .password-display.flash {
    border-color: var(--accent);
    box-shadow: 0 0 24px rgba(245,66,168,0.15);
  }

  .pw-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    gap: 12px;
    padding: 8px 12px;
    border-radius: 8px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
  }

  .pw-item:hover {
    background: rgba(245,66,168,0.06);
    border-color: rgba(245,66,168,0.25);
  }

  .pw-item span { flex: 1; word-break: break-all; }

  .pw-item .copy-btn-sm {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    padding: 4px;
    transition: color 0.2s;
    flex-shrink: 0;
  }

  .pw-item .copy-btn-sm:hover { color: var(--accent); }

  .placeholder-text {
    color: var(--muted);
    font-size: 14px;
    font-style: italic;
    font-family: 'Space Mono', monospace;
  }

  .strength-bar-wrap {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .strength-segments {
    display: flex;
    gap: 4px;
    flex: 1;
  }

  .seg {
    height: 4px;
    flex: 1;
    border-radius: 99px;
    background: var(--surface2);
    transition: background 0.4s ease;
  }

  .strength-label {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    min-width: 70px;
    text-align: right;
    text-transform: uppercase;
    letter-spacing: 1px;
    transition: color 0.4s;
  }

  .entropy-display {
    margin-top: 10px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    text-align: right;
  }

  .entropy-display span { color: var(--text); }

  .action-row {
    display: flex;
    gap: 10px;
    margin-top: 16px;
  }

  .btn-generate {
    flex: 1;
    background: var(--accent);
    color: #0a080f;
    border: none;
    border-radius: 12px;
    padding: 16px 24px;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.5px;
  }

  .btn-generate:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 30px rgba(245,66,168,0.35);
  }

  .btn-generate:active { transform: translateY(0); }

  .btn-copy, .btn-refresh {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 12px;
    padding: 16px 18px;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.2s;
  }

  .btn-copy:hover, .btn-refresh:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-copy.copied {
    border-color: #a742f5;
    color: #a742f5;
  }

  .section-title {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .length-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 24px;
  }

  .length-label {
    font-size: 13px;
    color: var(--muted);
    flex-shrink: 0;
    font-family: 'Space Mono', monospace;
  }

  .length-value {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    min-width: 52px;
    text-align: center;
    font-family: 'Space Mono', monospace;
    line-height: 1;
  }

  input[type="range"] {
    -webkit-appearance: none;
    flex: 1;
    height: 4px;
    border-radius: 99px;
    background: var(--surface2);
    outline: none;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 12px rgba(245,66,168,0.5);
    transition: box-shadow 0.2s;
  }

  input[type="range"]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 22px rgba(245,66,168,0.7);
  }

  .options-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }

  .toggle-option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }

  .toggle-option:hover { border-color: rgba(245,66,168,0.25); }

  .toggle-option.active {
    border-color: var(--accent);
    background: rgba(245,66,168,0.06);
  }

  .toggle-option input { display: none; }

  .toggle-check {
    width: 18px; height: 18px;
    border: 1.5px solid var(--border);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px;
    flex-shrink: 0;
    transition: all 0.2s;
    background: var(--surface);
  }

  .toggle-option.active .toggle-check {
    background: var(--accent);
    border-color: var(--accent);
    color: #0a080f;
  }

  .toggle-info { flex: 1; }

  .toggle-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    display: block;
  }

  .toggle-sample {
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
  }

  .count-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 8px;
  }

  .count-row label {
    font-size: 13px;
    color: var(--muted);
    font-family: 'Space Mono', monospace;
  }

  .count-btns {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .count-btn {
    width: 32px; height: 32px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }

  .count-btn:hover { border-color: var(--accent); color: var(--accent); }

  .count-display {
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    min-width: 28px;
    text-align: center;
    font-family: 'Space Mono', monospace;
  }

  .extra-option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }

  .extra-option:hover { border-color: rgba(245,66,168,0.25); }
  .extra-option.active { border-color: var(--accent); background: rgba(245,66,168,0.06); }
  .extra-option input[type="checkbox"] { display: none; }

  .history-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 200px;
    overflow-y: auto;
  }

  .history-list::-webkit-scrollbar { width: 4px; }
  .history-list::-webkit-scrollbar-track { background: transparent; }
  .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .history-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--text);
    transition: all 0.2s;
  }

  .history-item:hover { border-color: rgba(245,66,168,0.25); }
  .history-item span { flex: 1; word-break: break-all; }

  .history-item .h-copy {
    background: none; border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 13px;
    transition: color 0.2s;
    flex-shrink: 0;
    padding: 2px;
  }

  .history-item .h-copy:hover { color: var(--accent); }

  .history-empty {
    text-align: center;
    color: var(--muted);
    font-size: 13px;
    font-family: 'Space Mono', monospace;
    padding: 20px 0;
  }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--surface2);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 12px 24px;
    border-radius: 99px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    opacity: 0;
    transition: all 0.3s ease;
    pointer-events: none;
    z-index: 999;
    box-shadow: 0 4px 30px rgba(245,66,168,0.25);
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .charset-preview {
    margin-top: 8px;
    font-size: 11px;
    font-family: 'Space Mono', monospace;
    color: var(--muted);
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: 8px;
    border: 1px solid var(--border);
    word-break: break-all;
    line-height: 1.6;
    min-height: 36px;
  }

  .charset-preview strong { color: var(--text); }

  @keyframes charIn {
    from { opacity: 0; transform: translateY(-4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .pw-char {
    display: inline-block;
    animation: charIn 0.15s ease forwards;
    opacity: 0;
  }

  @media (max-width: 520px) {
    .options-grid { grid-template-columns: 1fr; }
    .card { padding: 20px; }
    .password-display { font-size: 14px; }
    .length-value { font-size: 22px; }
  }
</style>
</head>
<body>

<div class="container">

  <header>
    <div class="logo">
      <div class="logo-icon">🔑</div>
      <div class="logo-text">Key<span>Forge</span></div>
    </div>
    <p>// secure password generator v2.0</p>
  </header>

  <!-- Output Card -->
  <div class="card">
    <div class="output-section">
      <div class="output-label">Generated Password</div>
      <div class="password-display" id="pwDisplay">
        <span class="placeholder-text">No password yet — hit Generate!</span>
      </div>

      <div class="strength-bar-wrap">
        <div class="strength-segments">
          <div class="seg" id="seg1"></div>
          <div class="seg" id="seg2"></div>
          <div class="seg" id="seg3"></div>
          <div class="seg" id="seg4"></div>
          <div class="seg" id="seg5"></div>
        </div>
        <div class="strength-label" id="strengthLabel">—</div>
      </div>

      <div class="entropy-display">Entropy: <span id="entropyVal">—</span> bits</div>
    </div>

    <div class="action-row">
      <button class="btn-generate" onclick="generate()">⚡ Generate</button>
      <button class="btn-copy" id="copyBtn" onclick="copyPassword()" title="Copy">⎘</button>
      <button class="btn-refresh" onclick="generate()" title="Refresh">↺</button>
    </div>
  </div>

  <!-- Settings Card -->
  <div class="card">
    <div class="section-title">Settings</div>

    <div class="length-row">
      <span class="length-label">Length</span>
      <div class="length-value" id="lenVal">16</div>
      <input type="range" id="lengthSlider" min="4" max="128" value="16" oninput="updateLength()">
    </div>

    <div class="count-row">
      <label>Password count</label>
      <div class="count-btns">
        <button class="count-btn" onclick="changeCount(-1)">−</button>
        <div class="count-display" id="countDisplay">1</div>
        <button class="count-btn" onclick="changeCount(1)">+</button>
      </div>
    </div>

    <div style="margin-bottom: 24px;"></div>

    <div class="section-title">Character Types</div>

    <div class="options-grid">
      <label class="toggle-option active" id="opt-upper" onclick="toggleOpt('upper', this)">
        <input type="checkbox" id="upper" checked>
        <div class="toggle-check">✓</div>
        <div class="toggle-info">
          <span class="toggle-name">Uppercase</span>
          <span class="toggle-sample">A B C ... Z</span>
        </div>
      </label>

      <label class="toggle-option active" id="opt-lower" onclick="toggleOpt('lower', this)">
        <input type="checkbox" id="lower" checked>
        <div class="toggle-check">✓</div>
        <div class="toggle-info">
          <span class="toggle-name">Lowercase</span>
          <span class="toggle-sample">a b c ... z</span>
        </div>
      </label>

      <label class="toggle-option active" id="opt-numbers" onclick="toggleOpt('numbers', this)">
        <input type="checkbox" id="numbers" checked>
        <div class="toggle-check">✓</div>
        <div class="toggle-info">
          <span class="toggle-name">Numbers</span>
          <span class="toggle-sample">0 1 2 ... 9</span>
        </div>
      </label>

      <label class="toggle-option" id="opt-symbols" onclick="toggleOpt('symbols', this)">
        <input type="checkbox" id="symbols">
        <div class="toggle-check"></div>
        <div class="toggle-info">
          <span class="toggle-name">Symbols</span>
          <span class="toggle-sample">! @ # $ % ^</span>
        </div>
      </label>
    </div>

    <label class="extra-option" id="opt-noambig" onclick="toggleExtra('noambig', this)" style="margin-bottom: 10px;">
      <input type="checkbox" id="noambig">
      <div class="toggle-check" id="noambig-check"></div>
      <div class="toggle-info" style="margin-left: 12px;">
        <span class="toggle-name" style="font-size:13px;">Exclude ambiguous characters</span>
        <span class="toggle-sample">Removes O, 0, l, 1, I</span>
      </div>
    </label>

    <div class="section-title" style="margin-top: 24px;">Active Charset</div>
    <div class="charset-preview" id="charsetPreview">—</div>
  </div>

  <!-- History Card -->
  <div class="card">
    <div class="section-title" style="justify-content: space-between; display: flex; align-items: center;">
      <span>History</span>
      <button onclick="clearHistory()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;font-family:'Space Mono',monospace;letter-spacing:1px;">CLEAR</button>
    </div>
    <div class="history-list" id="historyList">
      <div class="history-empty">Nothing here yet...</div>
    </div>
  </div>

</div>

<div class="toast" id="toast">✓ Copied!</div>

<script>
  const CHARS = {
    upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
    lower: 'abcdefghijklmnopqrstuvwxyz',
    numbers: '0123456789',
    symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
  };

  const AMBIGUOUS = /[O0lI1]/g;

  let pwCount = 1;
  let history = [];
  let lastPasswords = [];

  function updateLength() {
    document.getElementById('lenVal').textContent = document.getElementById('lengthSlider').value;
    updateCharsetPreview();
  }

  function changeCount(delta) {
    pwCount = Math.max(1, Math.min(10, pwCount + delta));
    document.getElementById('countDisplay').textContent = pwCount;
  }

  function toggleOpt(id, label) {
    const cb = document.getElementById(id);
    cb.checked = !cb.checked;
    label.classList.toggle('active', cb.checked);
    label.querySelector('.toggle-check').textContent = cb.checked ? '✓' : '';
    updateCharsetPreview();
  }

  function toggleExtra(id, label) {
    const cb = document.getElementById(id);
    cb.checked = !cb.checked;
    label.classList.toggle('active', cb.checked);
    const check = document.getElementById(id + '-check');
    check.textContent = cb.checked ? '✓' : '';
    if (cb.checked) {
      check.style.background = 'var(--accent)';
      check.style.borderColor = 'var(--accent)';
      check.style.color = '#0a080f';
    } else {
      check.style.background = '';
      check.style.borderColor = '';
      check.style.color = '';
    }
    updateCharsetPreview();
  }

  function buildCharset() {
    let charset = '';
    if (document.getElementById('upper').checked) charset += CHARS.upper;
    if (document.getElementById('lower').checked) charset += CHARS.lower;
    if (document.getElementById('numbers').checked) charset += CHARS.numbers;
    if (document.getElementById('symbols').checked) charset += CHARS.symbols;
    if (document.getElementById('noambig').checked) charset = charset.replace(AMBIGUOUS, '');
    return charset;
  }

  function updateCharsetPreview() {
    const cs = buildCharset();
    const el = document.getElementById('charsetPreview');
    if (!cs) {
      el.innerHTML = '<span style="color:var(--danger)">⚠ Select at least one character type</span>';
    } else {
      el.innerHTML = `<strong>${cs.length} chars:</strong> ${cs.split('').map(c => `<span style="color:var(--accent)">${c}</span>`).join(' ')}`;
    }
  }

  function secureRandom(max) {
    const arr = new Uint32Array(1);
    crypto.getRandomValues(arr);
    return arr[0] % max;
  }

  function generateOne(length, charset) {
    let pw = '';
    const required = [];
    if (document.getElementById('upper').checked) required.push(CHARS.upper);
    if (document.getElementById('lower').checked) required.push(CHARS.lower);
    if (document.getElementById('numbers').checked) required.push(CHARS.numbers);
    if (document.getElementById('symbols').checked) required.push(CHARS.symbols);

    const noAmbig = document.getElementById('noambig').checked;
    const filteredRequired = noAmbig ? required.map(r => r.replace(AMBIGUOUS, '')) : required;

    for (const pool of filteredRequired) {
      if (pool.length) pw += pool[secureRandom(pool.length)];
    }

    while (pw.length < length) {
      pw += charset[secureRandom(charset.length)];
    }

    const arr = pw.split('');
    for (let i = arr.length - 1; i > 0; i--) {
      const j = secureRandom(i + 1);
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr.join('');
  }

  function calcEntropy(length, charsetSize) {
    return Math.round(length * Math.log2(charsetSize));
  }

  function getStrength(entropy) {
    if (entropy < 28) return { level: 1, label: 'Weak', color: 'var(--danger)' };
    if (entropy < 36) return { level: 2, label: 'Fair', color: 'var(--warn)' };
    if (entropy < 60) return { level: 3, label: 'Good', color: '#e042f5' };
    if (entropy < 80) return { level: 4, label: 'Strong', color: 'var(--accent)' };
    return { level: 5, label: 'Perfect', color: '#ff80d0' };
  }

  function animatePassword(pw) {
    const el = document.getElementById('pwDisplay');
    el.innerHTML = '';
    pw.split('').forEach((char, i) => {
      const span = document.createElement('span');
      span.className = 'pw-char';
      span.style.animationDelay = `${i * 15}ms`;
      span.textContent = char;
      el.appendChild(span);
    });
  }

  function generate() {
    const charset = buildCharset();
    if (!charset) {
      showToast('⚠ Select at least one character type!');
      return;
    }

    const length = parseInt(document.getElementById('lengthSlider').value);
    const passwords = [];
    for (let i = 0; i < pwCount; i++) {
      passwords.push(generateOne(length, charset));
    }

    lastPasswords = passwords;

    const display = document.getElementById('pwDisplay');

    if (pwCount === 1) {
      display.className = 'password-display';
      animatePassword(passwords[0]);
    } else {
      display.className = 'password-display multi';
      display.innerHTML = '';
      passwords.forEach((pw, i) => {
        const item = document.createElement('div');
        item.className = 'pw-item';
        item.innerHTML = `<span>${pw}</span><button class="copy-btn-sm" onclick="copySingle(event, '${pw}')" title="Copy">⎘</button>`;
        display.appendChild(item);
      });
    }

    display.classList.add('flash');
    setTimeout(() => display.classList.remove('flash'), 500);

    const entropy = calcEntropy(length, charset.length);
    const strength = getStrength(entropy);
    document.getElementById('entropyVal').textContent = entropy;
    document.getElementById('strengthLabel').textContent = strength.label;
    document.getElementById('strengthLabel').style.color = strength.color;

    for (let i = 1; i <= 5; i++) {
      const seg = document.getElementById(`seg${i}`);
      seg.style.background = i <= strength.level ? strength.color : 'var(--surface2)';
      seg.style.opacity = i <= strength.level ? '1' : '0.3';
    }

    passwords.forEach(pw => addToHistory(pw));

    const copyBtn = document.getElementById('copyBtn');
    copyBtn.classList.remove('copied');
    copyBtn.textContent = '⎘';
  }

  function copyPassword() {
    if (!lastPasswords.length) { showToast('Generate a password first'); return; }
    const text = lastPasswords.join('\n');
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.classList.add('copied');
      btn.textContent = '✓';
      showToast('✓ Copied!');
      setTimeout(() => { btn.classList.remove('copied'); btn.textContent = '⎘'; }, 2000);
    });
  }

  function copySingle(e, pw) {
    e.stopPropagation();
    navigator.clipboard.writeText(pw).then(() => showToast('✓ Copied!'));
  }

  function addToHistory(pw) {
    history.unshift(pw);
    if (history.length > 10) history.pop();
    renderHistory();
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    if (!history.length) {
      list.innerHTML = '<div class="history-empty">Nothing here yet...</div>';
      return;
    }
    list.innerHTML = history.map(pw => `
      <div class="history-item">
        <span>${pw}</span>
        <button class="h-copy" onclick="navigator.clipboard.writeText('${pw}').then(()=>showToast('✓ Copied!'))" title="Copy">⎘</button>
      </div>
    `).join('');
  }

  function clearHistory() {
    history = [];
    renderHistory();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  updateCharsetPreview();
</script>
</body>
</html>
